name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Extract game files to root
      run: |
        unzip game_project.zip
        cp -r game_project/* .

    - name: Build APK
      uses: digreatbrian/buildozer-action@v2
      with:
        python-version: '3.10'
        buildozer-cmd: buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: ./bin/*.apk
