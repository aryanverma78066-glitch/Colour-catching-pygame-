name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install all dependencies including aidl
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip wget \
          python3-dev libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev \
          libstdc++6 aidl

    - name: Install buildozer and cython
      run: pip install buildozer cython==0.29.33

    - name: Pre-accept ALL Android SDK licenses
      run: |
        SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR/licenses
        
        # android-sdk-license
        printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" \
          > $SDK_DIR/licenses/android-sdk-license
        
        # android-sdk-preview-license  
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n504667f4c0de7af1a06de9f4b1727b84351f2910" \
          > $SDK_DIR/licenses/android-sdk-preview-license

        # android-googletv-license
        printf "\n601085b94cd77f0b54ff86406957099ebe79c4d6" \
          > $SDK_DIR/licenses/android-googletv-license

        # intel-android-extra-license
        printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
          > $SDK_DIR/licenses/intel-android-extra-license

        # android-sdk-arm-dbt-license
        printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
          > $SDK_DIR/licenses/android-sdk-arm-dbt-license

        echo "✅ All licenses pre-accepted!"

    - name: Extract zip
      run: unzip game_project.zip -d game_project_extracted

    - name: Create buildozer.spec
      run: |
        cd game_project_extracted/game_project
        buildozer init
        sed -i 's/title = .*/title = MyGame/' buildozer.spec
        sed -i 's/package.name = .*/package.name = mygame/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.mygame/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,pygame/' buildozer.spec
        sed -i 's/source.include_exts = .*/source.include_exts = py,png,jpg,jpeg,ogg,mp3,wav,ttf,json,atlas/' buildozer.spec
        sed -i 's/#orientation = .*/orientation = landscape/' buildozer.spec
        sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
        sed -i 's/#android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        echo "✅ Spec ready!"

    - name: Build APK
      run: |
        cd game_project_extracted/game_project
        
        # Build karo
        buildozer android debug
        
        # Agar aidl nahi mila toh copy karke retry
        if [ $? -ne 0 ]; then
          AIDL_PATH=$(which aidl)
          BUILD_TOOLS=$HOME/.buildozer/android/platform/android-sdk/build-tools
          if [ -d "$BUILD_TOOLS" ]; then
            for dir in $BUILD_TOOLS/*/; do
              cp $AIDL_PATH $dir
              echo "Copied aidl to $dir"
            done
          fi
          buildozer android debug
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: game_project_extracted/game_project/bin/*.apk
