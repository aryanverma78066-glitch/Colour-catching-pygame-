name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git zip unzip \
          python3-dev libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev

    - name: Install buildozer and cython
      run: pip install buildozer cython==0.29.33

    - name: Extract zip
      run: unzip game_project.zip -d game_project_extracted

    - name: Accept licenses
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
        echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
        echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Build APK
      run: |
        cd game_project_extracted/game_project
        buildozer init
        sed -i 's/requirements = .*/requirements = python3,pygame/' buildozer.spec
        sed -i 's/source.include_exts = .*/source.include_exts = py,png,jpg,jpeg,ogg,mp3,wav,ttf,json,atlas/' buildozer.spec
        sed -i 's/#orientation = .*/orientation = landscape/' buildozer.spec
        sed -i 's/title = .*/title = MyGame/' buildozer.spec
        sed -i 's/package.name = .*/package.name = mygame/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = org.mygame/' buildozer.spec
        sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
        y | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: game-apk
        path: game_project_extracted/game_project/bin/*.apk
